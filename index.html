<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="Em7JFn5jW2SFxT6JYMMujYWXywObDE4tFUiFYBaSrs0">
  <meta name="description" content="Embed Digital — coming soon.">
  <meta property="og:title" content="Embed Digital — Coming Soon">
  <meta property="og:description" content="Something new is on the way.">
  <title>Embed Digital — Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Stardos+Stencil:wght@700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Permanent Marker', cursive;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      /* paper-like off-white background with subtle grain */
      background-color: #f6f1e4;
      background-image:
        radial-gradient(circle at 22% 28%, rgba(0,0,0,0.025) 1px, transparent 1.5px),
        radial-gradient(circle at 78% 72%, rgba(0,0,0,0.025) 1px, transparent 1.5px),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4), transparent 70%),
        linear-gradient(180deg, #faf6ec 0%, #ede5cf 100%);
      background-size: 60px 60px, 40px 40px, 100% 100%, 100% 100%;
      overflow: hidden;
      position: relative;
    }

    /* container holds the brand + stamp pair so we can position them as a unit */
    .stage {
      position: relative;
      display: inline-block;
      text-align: center;
      padding: 0 1rem;
    }

    .brand {
      font-family: 'Permanent Marker', cursive;
      font-size: clamp(3rem, 13vw, 9rem);
      color: #161616;
      line-height: 0.95;
      letter-spacing: -0.02em;
      transform: rotate(-2.5deg);
      display: inline-block;
      /* marker bleed effect */
      text-shadow:
        0 0 1px rgba(0,0,0,0.4),
        1px 0 0 rgba(20,20,20,0.25),
        0 1px 0 rgba(20,20,20,0.25);
      white-space: nowrap;
    }

    /* the "Coming Soon" stamp — overlaps the brand at lower right */
    .stamp {
      position: absolute;
      right: -2.5rem;
      bottom: -2rem;
      font-family: 'Stardos Stencil', monospace;
      font-weight: 700;
      color: #b81530;
      font-size: clamp(1.1rem, 3vw, 2rem);
      letter-spacing: 0.18em;
      padding: 0.5rem 1.25rem;
      border: 3.5px solid #b81530;
      transform: rotate(8deg);
      background: transparent;
      opacity: 0.88;
      /* slightly uneven ink */
      text-shadow: 0.5px 0 0 rgba(184,21,48,0.4);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35);
      white-space: nowrap;
    }

    .contact {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) rotate(-1deg);
      font-family: 'Permanent Marker', cursive;
      font-size: 0.95rem;
      color: #555;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .contact:hover { color: #161616; }

    /* tweak stamp positioning on narrow screens so it doesn't fall off-screen */
    @media (max-width: 600px) {
      .stamp {
        right: -0.5rem;
        bottom: -1.5rem;
        font-size: 1rem;
        padding: 0.4rem 0.9rem;
        letter-spacing: 0.14em;
      }
      .brand {
        font-size: clamp(2.5rem, 14vw, 5rem);
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <span class="brand">Embed Digital</span>
    <span class="stamp">Coming Soon</span>
  </div>

  <a class="contact" href="mailto:contact@embeddigital.co">contact@embeddigital.co</a>
</body>
</html>
